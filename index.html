<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロジェクトAI〜人類最後のアップデートが始まる〜</title>
    <style>
        :root {
            --bg-color: #030816;
            --panel-bg: rgba(6, 15, 37, 0.85);
            --accent-pink: #ff007f;
            --accent-pink-glow: rgba(255, 0, 127, 0.4); /* グロウ効果を少し控えめに */
            --text-main: #ffffff;
            --text-sub: #a0aec0;
            --grid-color: rgba(0, 150, 255, 0.04); /* グリッドをやや薄く */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow-x: hidden;
        }

        body.loading {
            overflow: hidden;
        }

        /* -----------------------------------------
           システム起動（ローディング）画面
        ----------------------------------------- */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            transition: opacity 0.5s cubic-bezier(0.19, 1, 0.22, 1), filter 0.5s, transform 0.5s;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10001;
        }

        /* 上下移動する光線を細く、動きをゆったりと変更 */
        .scanline::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 1.5px; /* 3px -> 1.5px に細分化 */
            background: rgba(255, 0, 127, 0.6); /* 不透明度を下げて馴染ませる */
            box-shadow: 0 0 8px var(--accent-pink-glow);
            animation: scan 6s linear infinite; /* 4s -> 6s で上品な速度に */
        }

        @keyframes scan {
            0% { top: -10px; }
            100% { top: 100%; }
        }

        .loader-content {
            text-align: center;
            z-index: 10000;
            padding: 20px;
        }

        .loader-status {
            font-size: 0.85rem;
            color: var(--accent-pink);
            text-shadow: 0 0 6px var(--accent-pink-glow);
            letter-spacing: 0.25em;
            margin-bottom: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .loader-percent {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            margin-bottom: 24px;
            letter-spacing: -0.05em;
        }

        .loader-bar-bg {
            width: 260px;
            max-width: 80vw;
            height: 8px; /* 少しスリムに */
            background: rgba(255, 255, 255, 0.05);
            margin: 0 auto;
            border: 1px solid rgba(255, 0, 127, 0.25);
            padding: 2px;
            box-sizing: content-box;
        }

        .loader-bar {
            width: 0%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg, 
                var(--accent-pink), 
                var(--accent-pink) 6px, 
                transparent 6px, 
                transparent 10px
            );
            box-shadow: 0 0 8px var(--accent-pink-glow);
            transition: width 0.05s ease-out;
        }

        /* グリッチ効果（ブレ）をマイルドに抑制 */
        .loader.fade-out {
            opacity: 0;
            filter: blur(2px);
            pointer-events: none;
            transform: scale(1.02);
            animation: loader-glitch 0.3s ease-out;
        }

        @keyframes loader-glitch {
            0% { transform: scale(1) skewX(0deg); }
            30% { transform: scale(1.01) skewX(2deg); filter: blur(1px); }
            60% { transform: scale(0.99) skewX(-1deg); }
            100% { transform: scale(1.02); opacity: 0; }
        }


        /* -----------------------------------------
           メイン画面
        ----------------------------------------- */
        .cyber-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--panel-bg);
            border: 1px solid var(--accent-pink);
            box-shadow: 0 0 12px var(--accent-pink-glow), inset 0 0 10px rgba(255, 0, 127, 0.05);
            padding: 40px;
            position: relative;
            
            opacity: 0;
            transform: translateY(15px) scale(0.98); /* 移動幅を抑えてスムーズに */
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cyber-container.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .cyber-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 16px;
            height: 16px;
            border-top: 3px solid var(--accent-pink);
            border-left: 3px solid var(--accent-pink);
        }

        .cyber-container::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 16px;
            height: 16px;
            border-bottom: 3px solid var(--accent-pink);
            border-right: 3px solid var(--accent-pink);
        }

        .header {
            border-bottom: 1px solid rgba(255, 0, 127, 0.2);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .title {
            font-size: 1.75rem;
            line-height: 1.4;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .title-accent {
            color: var(--accent-pink);
            text-shadow: 0 0 6px var(--accent-pink-glow);
        }

        .title-sub {
            display: block;
            font-size: 1.15rem;
            margin-top: 8px;
            color: var(--text-main);
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--accent-pink);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(255, 0, 127, 0.3);
        }

        .info-content {
            font-size: 1.2rem;
            background-color: rgba(10, 25, 60, 0.4);
            padding: 14px 18px;
            border-left: 3px solid var(--accent-pink);
            letter-spacing: 0.05em;
        }

        /* -----------------------------------------
           段階的表示（テンポを約2倍に高速化）
        ----------------------------------------- */
        .cyber-container .header,
        .cyber-container .info-group {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 表示のディレイを短縮し、サクサク動くように */
        .cyber-container.active .header {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.2s; /* 0.4s -> 0.2s */
        }

        .cyber-container.active .info-group:nth-of-type(1) {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.35s; /* 0.7s -> 0.35s */
        }

        .cyber-container.active .info-group:nth-of-type(2) {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.45s; /* 0.9s -> 0.45s */
        }

        @media (max-width: 480px) {
            .cyber-container {
                padding: 24px;
            }
            .title {
                font-size: 1.4rem;
            }
            .title-sub {
                font-size: 0.95rem;
            }
            .info-content {
                font-size: 1.05rem;
                padding: 10px 14px;
            }
            .loader-percent {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body class="loading">

    <div id="loader" class="loader">
        <div class="scanline"></div>
        <div class="loader-content">
            <div id="status" class="loader-status">BOOT SEQUENCE ACTIVE</div>
            <div id="percent" class="loader-percent">0%</div>
            <div class="loader-bar-bg">
                <div id="bar" class="loader-bar"></div>
            </div>
        </div>
    </div>

    <div class="cyber-container">
        <header class="header">
            <h1 class="title">
                <span class="title-accent">プロジェクトAI</span>
                <span class="title-sub">〜人類最後のアップデートが始まる〜</span>
            </h1>
        </header>

        <main class="info-section">
            <div class="info-group">
                <div class="info-label">日時</div>
                <div class="info-content">9月5日（土）　9:20 - 15:00</div>
            </div>

            <div class="info-group">
                <div class="info-label">場所</div>
                <div class="info-content">HR棟4階 1年4組</div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const percentEl = document.getElementById("percent");
            const barEl = document.getElementById("bar");
            const statusEl = document.getElementById("status");
            const loader = document.getElementById("loader");
            const container = document.querySelector(".cyber-container");

            const statuses = [
                "BOOT SEQUENCE ACTIVE",
                "CONNECTING TO AI CORE...",
                "DECRYPTING ARCHIVES...",
                "OPTIMIZING INTERFACE...",
                "SYSTEM READY"
            ];

            let progress = 0;

            function updateLoader() {
                // 進捗（％）の最低増分を増やし、全体的な処理スピードを向上
                const increment = Math.floor(Math.random() * 10) + 4; 
                progress = Math.min(progress + increment, 100);

                percentEl.textContent = `${progress}%`;
                barEl.style.width = `${progress}%`;

                if (progress < 20) {
                    statusEl.textContent = statuses[0];
                } else if (progress < 45) {
                    statusEl.textContent = statuses[1];
                } else if (progress < 70) {
                    statusEl.textContent = statuses[2];
                } else if (progress < 90) {
                    statusEl.textContent = statuses[3];
                } else {
                    statusEl.textContent = statuses[4];
                }

                if (progress < 100) {
                    // 更新間隔の最大遅延を短縮してテンポを良く
                    const delay = Math.floor(Math.random() * 40) + 15;
                    setTimeout(updateLoader, delay);
                } else {
                    // 100%に達した後の「余韻」と「遷移」にかかる時間を短縮
                    setTimeout(() => {
                        loader.classList.add("fade-out");
                        document.body.classList.remove("loading");
                        
                        setTimeout(() => {
                            loader.style.display = "none";
                            container.classList.add("active");
                        }, 300); // 400ms -> 300ms
                    }, 250); // 400ms -> 250ms
                }
            }

            // 初期化時の待ち時間も少し短く（300ms -> 150ms）
            setTimeout(updateLoader, 150);
        });
    </script>
</body>
</html>
