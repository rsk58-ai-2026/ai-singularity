<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロジェクトAI〜人類最後のアップデートが始まる〜</title>
    <style>
        :root {
            --bg-color: #030816;
            --panel-bg: rgba(6, 15, 37, 0.85);
            --accent-pink: #ff007f;
            --accent-pink-glow: rgba(255, 0, 127, 0.6);
            --text-main: #ffffff;
            --text-sub: #a0aec0;
            --grid-color: rgba(0, 150, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow-x: hidden;
            position: relative;
        }

        /* メイン画面 (cyber-container) */
        .cyber-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--panel-bg);
            border: 1px solid var(--accent-pink);
            box-shadow: 0 0 15px var(--accent-pink-glow), inset 0 0 15px rgba(255, 0, 127, 0.1);
            padding: 40px;
            position: relative;
            z-index: 100;
        }

        /* 装飾用コーナーライン */
        .cyber-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 20px;
            height: 20px;
            border-top: 4px solid var(--accent-pink);
            border-left: 4px solid var(--accent-pink);
        }

        .cyber-container::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            border-bottom: 4px solid var(--accent-pink);
            border-right: 4px solid var(--accent-pink);
        }

        .header {
            border-bottom: 1px solid rgba(255, 0, 127, 0.3);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .title {
            font-size: 1.75rem;
            line-height: 1.4;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .title-accent {
            color: var(--text-main);
            position: relative;
            display: inline-block;
        }

        .title-sub {
            display: block;
            font-size: 1.15rem;
            margin-top: 8px;
            color: var(--text-main);
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--accent-pink);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.4);
        }

        .info-content {
            font-size: 1.2rem;
            background-color: rgba(10, 25, 60, 0.5);
            padding: 14px 18px;
            border-left: 3px solid var(--accent-pink);
            letter-spacing: 0.05em;
        }

        /* 緊急メッセージエリア */
        .extra-messages {
            margin-top: 32px;
            padding: 24px;
            background: rgba(255, 0, 85, 0.08);
            border: 1px solid rgba(255, 0, 85, 0.3);
            box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.1);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
        }

        .msg-title {
            color: #ff0055;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 0, 85, 0.3);
            padding-bottom: 6px;
            font-family: 'Courier New', Courier, monospace;
        }

        .msg-item {
            font-size: 0.85rem;
            color: var(--text-main);
            line-height: 1.7;
            margin-bottom: 10px;
            position: relative;
            padding-left: 18px;
        }

        .msg-item::before {
            content: "▶";
            position: absolute;
            left: 0;
            color: #ff0055;
            font-size: 0.75rem;
        }

        .msg-item:last-child {
            margin-bottom: 0;
        }

        /* モバイル端末向けの調整 */
        @media (max-width: 480px) {
            body {
                padding: 20px 10px;
            }
            .cyber-container {
                padding: 24px;
            }
            .title {
                font-size: 1.4rem;
            }
            .title-sub {
                font-size: 0.95rem;
            }
            .info-content {
                font-size: 1.05rem;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- メインコンテンツ -->
    <div class="cyber-container">
        <header class="header">
            <h1 class="title">
                <span class="title-accent" data-text="プロジェクトAI">プロジェクトAI</span>
                <span class="title-sub">〜人類最後のアップデートが始まる〜</span>
            </h1>
        </header>

        <main class="info-section">
            <div class="info-group">
                <div class="info-label">日時</div>
                <div class="info-content">9月5日（土）　9:30 - 15:00</div>
            </div>

            <div class="info-group">
                <div class="info-label">場所</div>
                <div class="info-content">HR棟4階 1年4組</div>
            </div>

            <!-- 緊急メッセージエリア -->
            <div class="extra-messages">
                <div class="msg-title">EMERGENCY BROADCAST</div>
                <p class="msg-item">世界が崩壊する前に暴走を止めなければいけません。</p>
                <p class="msg-item">共に戦ってくれる仲間を探しています。</p>
                <p class="msg-item">AIによる人類アップデートを阻止するための猶予は僅かです。</p>
                <p class="msg-item">HR棟4階 1年4組。そこが我々の最終防衛ラインとなります。現地で合流してください。</p>
            </div>
        </main>
    </div>

</body>
</html>
