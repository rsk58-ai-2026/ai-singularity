<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画像</title></title>
  <style>
    /* 余白やスクロールバーをすべて消去 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #000; /* 背景色（黒） */
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 画像表示エリア */
    #slider-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #slide-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* 画面枠に合わせて全体を表示 */
      pointer-events: none;
    }

    /* 左右のクリック判定エリア（不可視） */
    .nav-zone {
      position: absolute;
      top: 0;
      height: 100%;
      width: 50%;
      cursor: pointer;
    }
    .nav-left {
      left: 0;
    }
    .nav-right {
      right: 0;
    }
  </style>
</head>
<body>

  <div id="slider-container">
    <img id="slide-img" src="" alt="">
    <!-- 画面の左半分・右半分のクリック判定 -->
    <div class="nav-zone nav-left" id="prev-btn"></div>
    <div class="nav-zone nav-right" id="next-btn"></div>
  </div>

  <script>
    // ==========================================
    //  設定
    // ==========================================
    const totalImages = 2; // ★ 画像の合計枚数を入力してください
    const startNumber = 1;  // 開始番号（通常は 1 ）
    // ==========================================

    let currentIndex = startNumber;

    const imgElement = document.getElementById('slide-img');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    // 画像の更新処理
    function updateImage() {
      imgElement.src = `${currentIndex}.png`;
    }

    // 前の画像へ（最初の画像より前に行こうとすると最後の画像へ移動）
    function prevSlide() {
      if (currentIndex > startNumber) {
        currentIndex--;
      } else {
        currentIndex = totalImages;
      }
      updateImage();
    }

    // 次の画像へ（最後の画像より先に行こうとすると最初の画像へ移動）
    function nextSlide() {
      if (currentIndex < totalImages) {
        currentIndex++;
      } else {
        currentIndex = startNumber;
      }
      updateImage();
    }

    // 画面クリックでの操作（左半分で戻る / 右半分で進む）
    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);

    // キーボード操作（← / →）
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        prevSlide();
      } else if (e.key === 'ArrowRight') {
        nextSlide();
      }
    });

    // スマホ・タブレットのスワイプ操作
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, false);

    document.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, false);

    function handleSwipe() {
      const diffX = touchEndX - touchStartX;
      const minSwipeDistance = 50; // スワイプとみなす最小距離(px)

      if (diffX > minSwipeDistance) {
        prevSlide(); // 右スワイプで前へ
      } else if (diffX < -minSwipeDistance) {
        nextSlide(); // 左スワイプで次へ
      }
    }

    // 初期化
    updateImage();
  </script>
</body>
</html>
