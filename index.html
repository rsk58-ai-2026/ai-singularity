<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロジェクトAI〜人類最後のアップデートが始まる〜</title>
    <style>
        :root {
            --bg-color: #030816;
            --panel-bg: rgba(6, 15, 37, 0.85);
            --accent-pink: #ff007f;
            --accent-pink-glow: rgba(255, 0, 127, 0.6);
            --text-main: #ffffff;
            --text-sub: #a0aec0;
            --grid-color: rgba(0, 150, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* サイバー風の背景グリッド */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow-x: hidden;
            position: relative;
        }

        /* 起動中のスクロール防止用クラス */
        body.loading {
            overflow: hidden;
        }

        /* -----------------------------------------
           【新規】砂嵐（スノーノイズ）オーバーレイ
        ----------------------------------------- */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            /* 砂嵐テクスチャの再現 */
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.06),
                rgba(255, 255, 255, 0.06) 1px,
                transparent 1px,
                transparent 2px
            ), repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.06),
                rgba(255, 255, 255, 0.06) 1px,
                transparent 1px,
                transparent 2px
            );
            background-size: 3px 3px;
            opacity: 0;
            pointer-events: none;
            z-index: 9990; /* ローダーの下、コンテンツの上 */
        }

        /* グリッチ発生時に砂嵐を激しく動かす */
        body.glitch-active::after {
            opacity: 1;
            animation: snow-noise 0.1s steps(2) infinite;
        }

        @keyframes snow-noise {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            20% { transform: translate(1%, 2%); }
            30% { transform: translate(-2%, -2%); }
            40% { transform: translate(1%, 3%); }
            50% { transform: translate(-1%, 1%); }
            60% { transform: translate(2%, -1%); }
            70% { transform: translate(-2%, 1%); }
            80% { transform: translate(1%, -2%); }
            90% { transform: translate(-1%, 2%); }
            100% { transform: translate(0, 0); }
        }

        /* -----------------------------------------
           システム起動（ローディング）画面
        ----------------------------------------- */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            transition: opacity 0.6s cubic-bezier(0.19, 1, 0.22, 1), filter 0.6s, transform 0.6s;
        }

        /* 全画面を覆うブラウン管風の走査線 */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.15) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10001;
        }

        /* 上下移動する光線 */
        .scanline::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-pink);
            box-shadow: 0 0 12px var(--accent-pink-glow);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: -10px; }
            100% { top: 100%; }
        }

        .loader-content {
            text-align: center;
            z-index: 10000;
            padding: 20px;
        }

        .loader-status {
            font-size: 0.85rem;
            color: var(--accent-pink);
            text-shadow: 0 0 8px var(--accent-pink-glow);
            letter-spacing: 0.25em;
            margin-bottom: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .loader-percent {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            margin-bottom: 24px;
            letter-spacing: -0.05em;
        }

        .loader-bar-bg {
            width: 260px;
            max-width: 80vw;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            margin: 0 auto;
            border: 1px solid rgba(255, 0, 127, 0.3);
            padding: 2px;
            box-sizing: content-box;
        }

        /* セグメント化されたサイバー風インジケーター */
        .loader-bar {
            width: 0%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg, 
                var(--accent-pink), 
                var(--accent-pink) 6px, 
                transparent 6px, 
                transparent 10px
            );
            box-shadow: 0 0 10px var(--accent-pink-glow);
            transition: width 0.08s ease-out;
        }

        /* システム起動完了時の画面のブレ（ノイズ・グリッチ）演出 */
        .loader.fade-out {
            opacity: 0;
            filter: hue-rotate(90deg) blur(4px);
            pointer-events: none;
            transform: scale(1.05);
            animation: loader-glitch 0.4s ease-out;
        }

        @keyframes loader-glitch {
            0% { transform: scale(1) skewX(0deg); filter: hue-rotate(0deg) contrast(1.2); }
            15% { transform: scale(1.03) skewX(4deg); filter: hue-rotate(45deg) contrast(1.5); }
            30% { transform: scale(0.98) skewX(-4deg); }
            45% { transform: scale(1.05) skewX(8deg) translateY(-3px); }
            60% { transform: scale(1) skewX(-8deg) translateY(3px); }
            75% { transform: scale(1.02) skewX(1deg); }
            100% { transform: scale(1.05) skewX(0deg); opacity: 0; }
        }


        /* -----------------------------------------
           メイン画面（既存スタイル調整含む）
        ----------------------------------------- */
        .cyber-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--panel-bg);
            border: 1px solid var(--accent-pink);
            box-shadow: 0 0 15px var(--accent-pink-glow), inset 0 0 15px rgba(255, 0, 127, 0.1);
            padding: 40px;
            position: relative;
            
            /* 初期状態：非表示・縮小 */
            opacity: 0;
            transform: translateY(25px) scale(0.97);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 起動完了後に付与される表示クラス */
        .cyber-container.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* 装飾用コーナーライン */
        .cyber-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 20px;
            height: 20px;
            border-top: 4px solid var(--accent-pink);
            border-left: 4px solid var(--accent-pink);
        }

        .cyber-container::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            border-bottom: 4px solid var(--accent-pink);
            border-right: 4px solid var(--accent-pink);
        }

        .header {
            border-bottom: 1px solid rgba(255, 0, 127, 0.3);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .title {
            font-size: 1.75rem;
            line-height: 1.4;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* -----------------------------------------
           【新規】RGBスプリット（色分離）の強化
        ----------------------------------------- */
        .title-accent {
            color: var(--text-main);
            position: relative;
            display: inline-block;
        }

        .title-accent::before,
        .title-accent::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
            opacity: 0;
        }

        /* 定期グリッチ時、疑似要素を色分離させて振動 */
        .cyber-container.glitch .title-accent::before {
            opacity: 0.8;
            color: #00ffff; /* シアン */
            z-index: -1;
            animation: rgb-split-left 0.15s steps(2) infinite;
        }

        .cyber-container.glitch .title-accent::after {
            opacity: 0.8;
            color: var(--accent-pink); /* マゼンタ */
            z-index: -2;
            animation: rgb-split-right 0.15s steps(2) infinite;
        }

        @keyframes rgb-split-left {
            0% { transform: translate(-6px, 2px) skewX(5deg); }
            50% { transform: translate(4px, -3px) skewX(-10deg); }
            100% { transform: translate(-3px, -1px) skewX(2deg); }
        }

        @keyframes rgb-split-right {
            0% { transform: translate(6px, -2px) skewX(-5deg); }
            50% { transform: translate(-4px, 3px) skewX(10deg); }
            100% { transform: translate(3px, 1px) skewX(-2deg); }
        }

        .title-sub {
            display: block;
            font-size: 1.15rem;
            margin-top: 8px;
            color: var(--text-main);
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--accent-pink);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.4);
        }

        .info-content {
            font-size: 1.2rem;
            background-color: rgba(10, 25, 60, 0.5);
            padding: 14px 18px;
            border-left: 3px solid var(--accent-pink);
            letter-spacing: 0.05em;
        }

        /* -----------------------------------------
           段階的表示（スタッガー効果）
        ----------------------------------------- */
        .cyber-container .header,
        .cyber-container .info-group {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* コンテナ展開に合わせて遅延表示 */
        .cyber-container.active .header {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.4s;
        }

        .cyber-container.active .info-group:nth-of-type(1) {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.7s;
        }

        .cyber-container.active .info-group:nth-of-type(2) {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.9s;
        }

        /* -----------------------------------------
           定期グリッチ（バグ風）アニメーション
        ----------------------------------------- */
        /* 【強化】コンテナ全体の引き裂き（clip-path）とブレ */
        .cyber-container.glitch {
            animation: container-glitch-complex 0.25s linear infinite;
            box-shadow: 
                -4px -2px 0px rgba(0, 255, 255, 0.8), /* シアン */
                4px 2px 0px rgba(255, 0, 127, 0.8),   /* マゼンタ */
                0 0 25px var(--accent-pink-glow),
                inset 0 0 15px rgba(255, 0, 127, 0.2);
        }

        /* 主要テキストのRGB色ズレ */
        .cyber-container.glitch .title-sub,
        .cyber-container.glitch .info-content {
            animation: text-glitch 0.2s linear infinite;
        }

        /* 【強化】画面全体のカラーフラッシュ・歪み変化 */
        body.glitch-active {
            animation: body-glitch-enhanced 0.3s steps(1) infinite;
            background-size: 15px 120px; /* 一瞬サイズが激しく変わる */
            background-position: 12px 24px;
        }

        /* コンテナが水平方向に引き裂かれる（スライス）複雑なバグ挙動 */
        @keyframes container-glitch-complex {
            0% {
                transform: translate(0, 0) skew(0deg);
                clip-path: inset(0 0 0 0);
            }
            10% {
                transform: translate(-6px, 2px) skew(-3deg);
                clip-path: inset(20% -10px 60% 0);
            }
            20% {
                transform: translate(6px, -3px) skew(5deg);
                clip-path: inset(70% 0 5% -10px);
            }
            30% {
                transform: translate(-2px, 4px) skew(-1deg);
                clip-path: inset(40% -10px 45% 0);
            }
            40% {
                transform: translate(4px, -1px) skew(3deg);
                clip-path: inset(10% 0 85% -10px);
            }
            50% {
                transform: translate(-5px, 5px) skew(-5deg);
                clip-path: inset(85% -10px 3% 0);
            }
            60% {
                transform: translate(3px, -4px) skew(2deg);
                clip-path: inset(0 0 0 0);
            }
            70% {
                transform: translate(-4px, -2px) skew(-3deg);
                clip-path: inset(30% -10px 50% 0);
            }
            80% {
                transform: translate(5px, 3px) skew(4deg);
                clip-path: inset(55% 0 25% -10px);
            }
            90% {
                transform: translate(-2px, -3px) skew(-2deg);
                clip-path: inset(0 0 0 0);
            }
            100% {
                transform: translate(0, 0) skew(0deg);
                clip-path: inset(0 0 0 0);
            }
        }

        @keyframes text-glitch {
            0% { text-shadow: -3px -1px 0 #00ffff, 3px 1px 0 var(--accent-pink); }
            20% { text-shadow: 3px -2px 0 #00ffff, -3px 2px 0 var(--accent-pink); }
            40% { text-shadow: -4px 2px 0 #00ffff, 4px -2px 0 var(--accent-pink); }
            60% { text-shadow: 2px 3px 0 #00ffff, -2px -3px 0 var(--accent-pink); }
            80% { text-shadow: -3px -2px 0 #00ffff, 3px 2px 0 var(--accent-pink); }
            100% { text-shadow: 3px 1px 0 #00ffff, -3px -1px 0 var(--accent-pink); }
        }

        /* 画面全体の激しいカラーフラッシュ・反転・回転の混合アニメーション */
        @keyframes body-glitch-enhanced {
            0% {
                filter: hue-rotate(0deg) contrast(1) brightness(1) invert(0);
                background-color: var(--bg-color);
            }
            15% {
                filter: hue-rotate(90deg) contrast(1.8) brightness(1.3) invert(0.1);
                background-color: rgba(255, 0, 0, 0.4); /* 赤フラッシュ */
                transform: scale(1.02) rotate(0.5deg);
            }
            30% {
                filter: hue-rotate(180deg) contrast(1.2) brightness(0.8) invert(0);
                background-color: var(--bg-color);
                transform: scale(0.99) rotate(-0.5deg);
            }
            45% {
                filter: hue-rotate(-60deg) contrast(1.6) brightness(1.4) invert(0.2);
                background-color: rgba(0, 0, 255, 0.4); /* 青フラッシュ */
                transform: scale(1.04) rotate(1deg);
            }
            60% {
                filter: hue-rotate(0deg) contrast(1) brightness(1) invert(0);
                background-color: var(--bg-color);
                transform: scale(1) rotate(0deg);
            }
            75% {
                filter: hue-rotate(120deg) contrast(2) brightness(1.5) invert(0);
                background-color: rgba(255, 0, 127, 0.3); /* ピンクフラッシュ */
                transform: scale(1.01) rotate(-1deg);
            }
            90% {
                filter: hue-rotate(-120deg) contrast(1.4) brightness(0.9) invert(0.05);
                background-color: var(--bg-color);
                transform: scale(1.03) rotate(0deg);
            }
            100% {
                filter: hue-rotate(0deg) contrast(1) brightness(1) invert(0);
                background-color: var(--bg-color);
                transform: scale(1) rotate(0deg);
            }
        }

        /* モバイル端末向けの調整 */
        @media (max-width: 480px) {
            .cyber-container {
                padding: 24px;
            }
            .title {
                font-size: 1.4rem;
            }
            .title-sub {
                font-size: 0.95rem;
            }
            .info-content {
                font-size: 1.05rem;
                padding: 10px 14px;
            }
            .loader-percent {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body class="loading">

    <!-- システム起動（ブート）画面 -->
    <div id="loader" class="loader">
        <div class="scanline"></div>
        <div class="loader-content">
            <div id="status" class="loader-status">BOOT SEQUENCE ACTIVE</div>
            <div id="percent" class="loader-percent">0%</div>
            <div class="loader-bar-bg">
                <div id="bar" class="loader-bar"></div>
            </div>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <div class="cyber-container">
        <header class="header">
            <h1 class="title">
                <!-- data-text属性を新設。CSSでRGBスプリット処理に使用 -->
                <span class="title-accent" data-text="プロジェクトAI">プロジェクトAI</span>
                <span class="title-sub">〜人類最後のアップデートが始まる〜</span>
            </h1>
        </header>

        <main class="info-section">
            <div class="info-group">
                <div class="info-label">日時</div>
                <div class="info-content">9月5日（土）　9:20 - 15:00</div>
            </div>

            <div class="info-group">
                <div class="info-label">場所</div>
                <div class="info-content">HR棟4階 1年4組</div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const percentEl = document.getElementById("percent");
            const barEl = document.getElementById("bar");
            const statusEl = document.getElementById("status");
            const loader = document.getElementById("loader");
            const container = document.querySelector(".cyber-container");

            // 文字化け演出用のターゲット
            const titleAccent = document.querySelector(".title-accent");
            const originalText = "プロジェクトAI";
            const glitchChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;':\",./<>?Pг0jэcт_A1プロジェトAI";

            // 起動中のシステム状況風メッセージ
            const statuses = [
                "BOOT SEQUENCE ACTIVE",
                "CONNECTING TO AI CORE...",
                "DECRYPTING ARCHIVES...",
                "OPTIMIZING INTERFACE...",
                "SYSTEM READY"
            ];

            let progress = 0;

            function updateLoader() {
                const increment = Math.floor(Math.random() * 8) + 2; 
                progress = Math.min(progress + increment, 100);

                percentEl.textContent = `${progress}%`;
                barEl.style.width = `${progress}%`;

                if (progress < 20) {
                    statusEl.textContent = statuses[0];
                } else if (progress < 45) {
                    statusEl.textContent = statuses[1];
                } else if (progress < 70) {
                    statusEl.textContent = statuses[2];
                } else if (progress < 90) {
                    statusEl.textContent = statuses[3];
                } else {
                    statusEl.textContent = statuses[4];
                }

                if (progress < 100) {
                    const delay = Math.floor(Math.random() * 60) + 15;
                    setTimeout(updateLoader, delay);
                } else {
                    setTimeout(() => {
                        loader.classList.add("fade-out");
                        document.body.classList.remove("loading");
                        
                        setTimeout(() => {
                            loader.style.display = "none";
                            container.classList.add("active");

                            // メイン表示の完了後、定期グリッチを開始
                            setTimeout(startGlitchLoop, 1500);
                        }, 400); 
                    }, 400);
                }
            }

            // グリッチ（バグ）演出を再帰的に実行するループ処理
            function startGlitchLoop() {
                const minDelay = 5000;
                const maxDelay = 12000;
                const randomDelay = Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;

                setTimeout(() => {
                    // 各種クラスを付与し、CSS側のダイナミックなグリッチ効果を発動
                    container.classList.add("glitch");
                    document.body.classList.add("glitch-active");

                    // 【新規】グリッチ中の高速文字化け処理
                    let scrambleInterval = setInterval(() => {
                        let scrambled = "";
                        for (let i = 0; i < originalText.length; i++) {
                            // 確率でノイズキャラに変換し、一部は元テキストの形を残す
                            if (Math.random() < 0.7) {
                                scrambled += glitchChars[Math.floor(Math.random() * glitchChars.length)];
                            } else {
                                scrambled += originalText[i];
                            }
                        }
                        // テキストとCSS属性(data-text)を同時に書き換えてRGBスプリットも連動させる
                        titleAccent.textContent = scrambled;
                        titleAccent.setAttribute("data-text", scrambled);
                    }, 60);

                    const minDuration = 250;
                    const maxDuration = 600;
                    const randomDuration = Math.floor(Math.random() * (maxDuration - minDuration + 1)) + minDuration;

                    setTimeout(() => {
                        // クラスを削除して状態を復元
                        container.classList.remove("glitch");
                        document.body.classList.remove("glitch-active");

                        // 【新規】文字化けを解除し、元のテキストに戻す
                        clearInterval(scrambleInterval);
                        titleAccent.textContent = originalText;
                        titleAccent.setAttribute("data-text", originalText);

                        // 次回のグリッチ実行をスケジュール
                        startGlitchLoop();
                    }, randomDuration);

                }, randomDelay);
            }

            // 起動処理開始
            setTimeout(updateLoader, 300);
        });
    </script>
</body>
</html>
